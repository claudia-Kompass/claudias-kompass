<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GLOBAL SOUL</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#081626,#163a57);
color:#f5f1e6;
}

.container{
padding:40px;
max-width:900px;
margin:auto;
}

h1{
font-size:42px;
margin-bottom:8px;
}

.subtitle{opacity:.8}

button{
margin-top:18px;
padding:10px 18px;
background:#e6c27a;
border:none;
border-radius:6px;
cursor:pointer;
}

.section{
margin-top:40px;
}

.section h2{
color:#e6c27a;
border-bottom:1px solid rgba(255,255,255,.2);
padding-bottom:6px;
margin-bottom:18px;
}

.line{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.newsItem{margin-bottom:18px}

.newsSource{
font-size:13px;
opacity:.6;
}

.news-link{
color:#f1c40f;
text-decoration:none;
}

.weatherNow{
font-size:24px;
margin-bottom:10px;
}

.trendBlock{
display:flex;
gap:60px;
margin-left:40px;
}

.trendItem{
text-align:center;
}

</style>
</head>


<body>

<div class="container">

<h1>🌍 GLOBAL SOUL</h1>
<div class="subtitle">Claudia’s Daily Compass</div>
<div class="subtitle"><i>Zwischen Heimat und Horizont.</i></div>

<div id="meta"></div>

<button onclick="loadData()">Neue Ausgabe</button>


<div class="section">
<h2>Politik & Weltgeschehen</h2>
<div id="newsBlock"></div>
</div>


<div class="section">
<h2>📊 Märkte & Krypto</h2>

<div class="line">
<div>DAX</div>
<div id="daxValue"></div>
</div>

<div class="line">
<div>EUR/USD</div>
<div id="eurusdValue"></div>
</div>

<div class="line">
<div>Bitcoin</div>
<div id="btcValue"></div>
</div>

<div class="line">
<div>Nexo</div>
<div id="nexoValue"></div>
</div>

</div>


<div class="section">
<h2>Regional – Landkreis Schwäbisch Hall</h2>
<div id="regionalBlock"></div>
</div>


<div class="section">
<h2>Veranstaltungen</h2>
<div id="eventsBlock"></div>
</div>


<div class="section">
<h2>Wetter – Ilshofen</h2>

<div id="weatherNow" class="weatherNow"></div>

<div class="trendBlock">

<div class="trendItem">
<div id="morningIcon"></div>
<div>09:00</div>
<div id="morningTemp"></div>
</div>

<div class="trendItem">
<div id="afternoonIcon"></div>
<div>15:00</div>
<div id="afternoonTemp"></div>
</div>

<div class="trendItem">
<div id="eveningIcon"></div>
<div>21:00</div>
<div id="eveningTemp"></div>
</div>

</div>

</div>

</div>



<script>


function weatherIcon(code){

if(code===0) return "☀️";
if(code<=2) return "🌤️";
if(code===3) return "☁️";
if(code<=65) return "🌧️";
if(code<=75) return "❄️";
return "⛈️";

}



async function loadData(){

try{

const res = await fetch("/api/daily");

const data = await res.json();

render(data);

}
catch(err){

console.error("LOAD ERROR",err);

}

}



function render(data){

document.getElementById("meta").innerText =
data.timestamp + " • v" + data.version;


/* NEWS */

if(data.news){

document.getElementById("newsBlock").innerHTML =
data.news.map(n=>`

<div class="newsItem">
<div style="font-weight:600">${n.title}</div>
<a href="${n.url}" target="_blank" class="news-link">weiterlesen →</a>
<div class="newsSource">${n.source}</div>
</div>

`).join("");

}



/* MARKETS */

document.getElementById("daxValue").innerText =
data.markets?.dax?.value ?? "-";

document.getElementById("eurusdValue").innerText =
data.markets?.eurusd?.value ?? "-";



/* CRYPTO */

document.getElementById("btcValue").innerText =
"$"+(data.crypto?.bitcoin?.usd ?? 0).toLocaleString();

document.getElementById("nexoValue").innerText =
"$"+(data.crypto?.nexo?.usd ?? 0).toFixed(2);



/* REGIONAL */

if(data.regional){

document.getElementById("regionalBlock").innerHTML =
data.regional.map(r=>`

<div class="newsItem">
<div style="font-weight:600">${r.title}</div>
<a href="${r.url}" target="_blank" class="news-link">weiterlesen →</a>
<div class="newsSource">${r.source}</div>
</div>

`).join("");

}



/* EVENTS */

if(data.events?.week){

document.getElementById("eventsBlock").innerHTML =
data.events.week.map(e=>`

<div class="newsItem">
<div style="font-weight:600">${e.title}</div>
<div class="newsSource">${e.city}</div>
<div class="newsSource">${e.date} ${e.time}</div>
</div>

`).join("");

}



/* WEATHER */

document.getElementById("weatherNow").innerHTML =
weatherIcon(data.weather.code)+" "+data.weather.temp+"°C";

document.getElementById("morningIcon").innerText =
weatherIcon(data.weather.trend.morning.code);

document.getElementById("morningTemp").innerText =
data.weather.trend.morning.temp+"°C";

document.getElementById("afternoonIcon").innerText =
weatherIcon(data.weather.trend.afternoon.code);

document.getElementById("afternoonTemp").innerText =
data.weather.trend.afternoon.temp+"°C";

document.getElementById("eveningIcon").innerText =
weatherIcon(data.weather.trend.evening.code);

document.getElementById("eveningTemp").innerText =
data.weather.trend.evening.temp+"°C";

}


window.addEventListener("load",loadData);

</script>

</body>
</html>
