<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GLOBAL SOUL</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#081626,#163a57);
    color:#f5f1e6;
}

/* Layout */
.container{
    padding:40px;
    max-width:900px;
    margin:auto;
}

/* Titel */
h1{
    font-size:44px;
    letter-spacing:2px;
    font-weight:600;
    margin-bottom:10px;
}

.subtitle{
    opacity:0.85;
    font-weight:400;
}

.meta{
    margin-top:6px;
    font-size:14px;
    opacity:0.6;
}

/* Button */
button{
    margin-top:20px;
    padding:10px 18px;
    border:none;
    background:#e6c27a;
    color:#081626;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
}

/* Sections */
.section{
    margin-top:40px;
}

.section h2{
    color:#e6c27a;
    font-size:24px;
    font-weight:600;
    border-bottom:1px solid rgba(255,255,255,0.15);
    padding-bottom:6px;
    margin-bottom:20px;
}

/* Märkte / Krypto */
.line{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
}

.line div:first-child{
    font-weight:500;
}

.line small{
    font-size:13px;
    opacity:0.6;
    font-weight:400;
}

/* Ampel */
.ampel{
    width:10px;
    height:10px;
    border-radius:50%;
    display:inline-block;
    margin-left:8px;
}

.green{ background:#2ecc71; }
.red{ background:#e74c3c; }
.yellow{ background:#f1c40f; }

/* Info-Link (bleibt gold wie Märkte) */
.info{
    color:#f1c40f;
    margin-left:12px;
    text-decoration:none;
    font-weight:500;
}

/* News */
.newsItem{
    margin-bottom:22px;
}

.newsItem a{
    text-decoration:none;
}

.newsItem a:first-child{
    color:#f5f1e6;
    font-weight:600;
    font-size:16px;
}

.news-link{
    color:#f1c40f;
    font-size:14px;
    font-weight:500;
}

.news-link:hover{
    text-decoration:underline;
}

.newsSource{
    font-size:13px;
    opacity:0.6;
    margin-top:4px;
}

.news-link{
    color:#f1c40f;
    font-size:14px;
    text-decoration:none;
    font-weight:500;
}

.news-link:hover{
    text-decoration:underline;
}

/* Wetter */
.weatherNow{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:26px;
    font-weight:500;
}

.trendBlock{
    display:flex;
    gap:70px;
    margin-top:12px;
    margin-left:52px;
}

.trendItem{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.trendIcon{
    font-size:20px;
}

.trendTime{
    font-size:12px;
    opacity:0.6;
    margin-top:6px;
}

.trendTemp{
    font-size:16px;
    font-weight:500;
    margin-top:4px;
}

</style>
</head>

<body>
<div class="container">

<h1>🌍 GLOBAL SOUL</h1>
<div class="subtitle">Claudia’s Daily Compass</div>
<div class="subtitle"><i>Zwischen Heimat und Horizont.</i></div>
<div id="meta" class="meta"></div>

<button onclick="loadData()">Neue Ausgabe</button>

<div class="section">
<h2>Märkte</h2>

<div class="line">
<div>DAX<br><small id="daxDate"></small></div>
<div><span id="daxValue"></span></div>
</div>

<div class="line">
<div>EUR/USD<br><small id="eurusdDate"></small></div>
<div><span id="eurusdValue"></span></div>
</div>
</div>

<div class="section">
<h2>Krypto</h2>

<div class="line">
<div>Bitcoin</div>
<div id="btcValue"></div>
</div>

<div class="line">
<div>Nexo</div>
<div id="nexoValue"></div>
</div>
</div>

<div class="section">
  <h2>Politik & Weltgeschehen</h2>
  <div id="newsBlock"></div>
</div>
  
<div class="section">
<h2>Wetter – Ilshofen</h2>

<div id="weatherNow" class="weatherNow"></div>

<div class="trendBlock">

<div class="trendItem">
<div id="mIcon" class="trendIcon"></div>
<div class="trendTime">09:00</div>
<div id="morning" class="trendTemp"></div>
</div>

<div class="trendItem">
<div id="aIcon" class="trendIcon"></div>
<div class="trendTime">15:00</div>
<div id="afternoon" class="trendTemp"></div>
</div>

<div class="trendItem">
<div id="eIcon" class="trendIcon"></div>
<div class="trendTime">21:00</div>
<div id="evening" class="trendTemp"></div>
</div>

</div>
</div>

</div>

<script>

function ampel(change){
  if(change > 1) return '<span class="ampel green"></span>';
  if(change < -1) return '<span class="ampel red"></span>';
  return '<span class="ampel yellow"></span>';
}

function weatherIcon(code){
  const hour = new Date().getHours();

if(code===0){
  if(hour >= 20 || hour < 6) return "🌙";
  return "☀️";
}
  if(code===1 || code===2) return "🌤️";
  if(code===3) return "☁️";
  if(code>=45 && code<=48) return "🌫️";
  if(code>=51 && code<=65) return "🌧️";
  if(code>=71 && code<=75) return "❄️";
  if(code>=95) return "⛈️";
  return "🌡️";
}

function formatMeta(data){
  const now = new Date();
  return now.toLocaleDateString("de-DE") + ", " +
         now.toLocaleTimeString("de-DE") +
         " • v" + data.version;
}

function loadData(){
fetch("/api/daily")
.then(res=>res.json())
.then(data=>{

document.getElementById("meta").innerText = formatMeta(data);

document.getElementById("daxValue").innerText = data.markets.dax.value;
document.getElementById("daxDate").innerText = data.markets.dax.date;

document.getElementById("eurusdValue").innerText = data.markets.eurusd.value;
document.getElementById("eurusdDate").innerText = data.markets.eurusd.date;

document.getElementById("btcValue").innerHTML =
"$" + data.crypto.bitcoin.usd.toLocaleString() +
" (€" + data.crypto.bitcoin.eur.toLocaleString() + ")" +
ampel(data.crypto.bitcoin.change) +
' <a class="info" href="https://www.coingecko.com/en/coins/bitcoin" target="_blank">Info</a>';

document.getElementById("nexoValue").innerHTML =
"$" + data.crypto.nexo.usd.toFixed(2) +
" (€" + data.crypto.nexo.eur.toFixed(3) + ")" +
ampel(data.crypto.nexo.change) +
' <a class="info" href="https://www.coingecko.com/en/coins/nexo" target="_blank">Info</a>';

document.getElementById("weatherNow").innerHTML =
weatherIcon(data.weather.code) +
" <span>" + data.weather.temp.toFixed(1) + "°C</span>";

document.getElementById("mIcon").innerHTML =
weatherIcon(data.weather.trend.morning.code);
document.getElementById("morning").innerText =
data.weather.trend.morning.temp.toFixed(1) + "°C";

document.getElementById("aIcon").innerHTML =
weatherIcon(data.weather.trend.afternoon.code);
document.getElementById("afternoon").innerText =
data.weather.trend.afternoon.temp.toFixed(1) + "°C";

document.getElementById("eIcon").innerHTML =
weatherIcon(data.weather.trend.evening.code);
document.getElementById("evening").innerText =
data.weather.trend.evening.temp.toFixed(1) + "°C";

// NEWS RENDER
const newsBlock = document.getElementById("newsBlock");

if(data.news && data.news.length){
  newsBlock.innerHTML = data.news.slice(0,3).map(n => `
  <div class="newsItem" style="margin-bottom:18px;">
    <div style="font-weight:600; margin-bottom:6px;">
      ${n.title}
    </div>

    <a href="${n.url}" target="_blank" class="news-link">
      weiterlesen →
    </a>

    <div class="newsSource" style="margin-top:4px; opacity:0.6;">
      ${n.source}
    </div>
  </div>
`).join("");
}
  
});
}

loadData();

</script>

</body>
</html>
