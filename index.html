<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GLOBAL SOUL</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#081626,#163a57);
color:#f5f1e6;
}

.container{
padding:40px;
max-width:900px;
margin:auto;
}

h1{
font-size:44px;
letter-spacing:2px;
margin-bottom:10px;
}

.subtitle{opacity:.85}

.meta{
font-size:14px;
opacity:.6;
margin-top:4px;
}

button{
margin-top:20px;
padding:10px 18px;
border:none;
background:#e6c27a;
color:#081626;
border-radius:6px;
cursor:pointer;
}

.section{
margin-top:40px;
}

.section h2{
color:#e6c27a;
font-size:24px;
border-bottom:1px solid rgba(255,255,255,.15);
padding-bottom:6px;
margin-bottom:20px;
}

.line{
display:flex;
justify-content:space-between;
margin:12px 0;
}

.newsItem{margin-bottom:20px}

.news-link{
color:#f1c40f;
text-decoration:none;
}

.newsSource{
font-size:13px;
opacity:.6;
margin-top:4px;
}

.weatherNow{
display:flex;
gap:10px;
font-size:26px;
}

.trendBlock{
display:flex;
gap:70px;
margin-top:12px;
margin-left:52px;
}

.trendItem{
display:flex;
flex-direction:column;
align-items:center;
}

.ampel{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
margin-left:8px;
}

.green{background:#2ecc71}
.red{background:#e74c3c}
.yellow{background:#f1c40f}

.info{
color:#f1c40f;
margin-left:10px;
text-decoration:none;
}

</style>
</head>


<body>

<div class="container">

<h1>🌍 GLOBAL SOUL</h1>
<div class="subtitle">Claudia’s Daily Compass</div>
<div class="subtitle"><i>Zwischen Heimat und Horizont.</i></div>
<div id="meta" class="meta"></div>

<button onclick="loadData()">Neue Ausgabe</button>


<div class="section">
<h2>Politik & Weltgeschehen</h2>
<div id="newsBlock"></div>
</div>


<div class="section">
<h2>📊 Märkte & Krypto</h2>

<div class="line">
<div>DAX<br><small id="daxDate"></small></div>
<div id="daxValue"></div>
</div>

<div class="line">
<div>EUR/USD<br><small id="eurusdDate"></small></div>
<div id="eurusdValue"></div>
</div>

<div class="line">
<div>Bitcoin</div>
<div id="btcValue"></div>
</div>

<div class="line">
<div>Nexo</div>
<div id="nexoValue"></div>
</div>

</div>


<section class="section">
<h2>Regional – Landkreis Schwäbisch Hall</h2>
<div id="regional-news"></div>
</section>


<div class="section">
<h2>Persönlicher Fokus</h2>
<div id="focusBlock"></div>
</div>


<section class="section">
<h2>Veranstaltungen</h2>
<div id="events-list"></div>
</section>


<section class="section">
<h2>💃 Tanz & Rhythmus</h2>
<div id="dance-list"></div>
</section>


<div class="section">
<h2>Wetter – Ilshofen</h2>

<div id="weatherNow" class="weatherNow"></div>

<div class="trendBlock">

<div class="trendItem">
<div id="mIcon"></div>
<div>09:00</div>
<div id="morning"></div>
</div>

<div class="trendItem">
<div id="aIcon"></div>
<div>15:00</div>
<div id="afternoon"></div>
</div>

<div class="trendItem">
<div id="eIcon"></div>
<div>21:00</div>
<div id="evening"></div>
</div>

</div>
</div>

</div>



<script>


function ampel(change){
if(change>1)return'<span class="ampel green"></span>';
if(change<-1)return'<span class="ampel red"></span>';
return'<span class="ampel yellow"></span>';
}


function weatherIcon(code){
if(code===0)return"☀️";
if(code<=2)return"🌤️";
if(code===3)return"☁️";
if(code<=65)return"🌧️";
if(code<=75)return"❄️";
return"⛈️";
}


function formatMeta(data){
const now=new Date();
return now.toLocaleDateString("de-DE")+" "+
now.toLocaleTimeString("de-DE")+" • v"+(data.version??"?");
}


async function loadData(){

try{

const res=await fetch("/api/daily");

if(!res.ok)throw new Error("API Fehler");

const data=await res.json();

localStorage.setItem("dailyCache",JSON.stringify(data));

renderAll(data);

}

catch(err){

console.warn("API Fehler – Cache wird geladen");

const cached=localStorage.getItem("dailyCache");

if(cached){
renderAll(JSON.parse(cached));
}

}

}



function renderAll(data){

document.getElementById("meta").innerText=formatMeta(data);


/* MARKETS */

daxValue.innerText=data.markets?.dax?.value??"-";
daxDate.innerText=data.markets?.dax?.date??"-";

eurusdValue.innerText=data.markets?.eurusd?.value??"-";
eurusdDate.innerText=data.markets?.eurusd?.date??"-";


/* CRYPTO */

btcValue.innerHTML=
"$"+(data.crypto?.bitcoin?.usd??0).toLocaleString()+
" "+ampel(data.crypto?.bitcoin?.usd_24h_change??0);

nexoValue.innerHTML=
"$"+(data.crypto?.nexo?.usd??0).toFixed(2)+
" "+ampel(data.crypto?.nexo?.usd_24h_change??0);


/* WEATHER */

weatherNow.innerHTML=
weatherIcon(data.weather?.code??0)+" "+
(data.weather?.temp??0)+"°C";

mIcon.innerHTML=weatherIcon(data.weather?.trend?.morning?.code??0);
morning.innerText=(data.weather?.trend?.morning?.temp??0)+"°C";

aIcon.innerHTML=weatherIcon(data.weather?.trend?.afternoon?.code??0);
afternoon.innerText=(data.weather?.trend?.afternoon?.temp??0)+"°C";

eIcon.innerHTML=weatherIcon(data.weather?.trend?.evening?.code??0);
evening.innerText=(data.weather?.trend?.evening?.temp??0)+"°C";


/* GLOBAL NEWS */

if(data.news?.length){

newsBlock.innerHTML=data.news.map(n=>`
<div class="newsItem">
<div style="font-weight:600">${n.title}</div>
<a href="${n.url}" target="_blank" class="news-link">weiterlesen →</a>
<div class="newsSource">${n.source}</div>
</div>
`).join("");

}


/* REGIONAL */

if(data.regional?.length){

document.getElementById("regional-news").innerHTML=
data.regional.map(r=>`
<div class="newsItem">
<div style="font-weight:600">${r.title}</div>
<a href="${r.url}" target="_blank" class="news-link">weiterlesen →</a>
<div class="newsSource">${r.source?.name??""}</div>
</div>
`).join("");

}


/* FOCUS */

if(data.focus){

focusBlock.innerHTML=
"<div style='font-weight:600'>"+data.focus.title+"</div>"+
"<div>"+data.focus.text+"</div>";

}


/* EVENTS */

if(data.events?.week){

events-list.innerHTML=
data.events.week.map(e=>`
<div class="newsItem">
<div style="font-weight:600">${e.title}</div>
<div class="newsSource">${e.city??""}</div>
<div class="newsSource">${e.date??""}</div>
</div>
`).join("");

}


/* DANCE */

if(data.dance?.length){

dance-list.innerHTML=
data.dance.map(d=>`
<div class="newsItem">
<div style="font-weight:600">${d.title}</div>
<div class="newsSource">${d.city} • ${d.date}</div>
</div>
`).join("");

}

}



window.addEventListener("load",loadData);

</script>

</body>
</html>
